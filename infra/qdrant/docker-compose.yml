name: secure-lan-suite-qdrant

services:
  qdrant:
    image: qdrant/qdrant:v1.14.1
    container_name: secure-lan-suite-qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage
      - ./snapshots:/qdrant/snapshots
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'printf > /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
